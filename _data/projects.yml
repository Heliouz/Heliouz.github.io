- id: qpqt
  title_es: QPQT
  title_en: QPQT
  type_es: app web · ingeniería
  type_en: web app · engineering
  year: "2023"
  tags_es: [python, dash, plotly, metalurgia]
  tags_en: [python, dash, plotly, metallurgy]
  wide: true
  thumb: /assets/images/qpqt/zoom.gif
  desc_es: >
    Calculadora desarrollada como parte de mi tesis de maestría. Facilita el diseño
    de aceros de temple y particionado (Q&P): calcula fracciones de fase, temperatura
    ideal de temple y porcentaje de carbono en tiempo real.
  desc_en: >
    Calculator developed as part of my master's thesis. Facilitates the design
    of quench & partition steels (Q&P): calculates phase fractions, ideal quench
    temperature and carbon percentage in real time.
  images:
    - src: /assets/images/qpqt/ss.png
      alt: interfaz principal de QPQT
    - src: /assets/images/qpqt/qttc.png
      alt: temperatura ideal de temple vs carbono
      group: curves
    - src: /assets/images/qpqt/qtta.png
      alt: fracción de austenita retenida vs carbono
      group: curves
    - src: /assets/images/qpqt/zoom.gif
      alt: demo interactivo — gráficas en tiempo real
  sections_es:
    - label: funcionamiento
      text: >
        La calculadora recibe los porcentajes en peso de los elementos aleantes
        y calcula de forma inmediata las fracciones de fase y la temperatura ideal
        de temple. Programada en Python con base en el método propuesto por Speer et al.
        para el particionado del carbono en aceros. La temperatura Ms y el coeficiente α
        se calculan con las expresiones de van Bohemen.
    - label: otras curvas
      text: >
        Se pueden graficar la temperatura ideal de temple y la fracción máxima
        de austenita retenida con respecto al porcentaje de carbono de la aleación.
    - label: interfaz
      text: >
        La interfaz gráfica y el deployment se realizó con Dash a través de un servidor
        web, de forma que la calculadora puede ser utilizada por cualquier dispositivo
        con un navegador. Las gráficas son interactivas y se actualizan en tiempo real
        al ajustar los porcentajes en peso.
    - label: acceso
      text: Aplicación no pública — contactarme para más información.
  sections_en:
    - label: how it works
      text: >
        The calculator takes weight percentages of alloying elements and immediately
        outputs phase fractions and ideal quench temperature. Built in Python using
        the Speer et al. method for carbon partitioning in steels. Ms temperature
        and α coefficient use van Bohemen expressions.
    - label: additional curves
      text: >
        The ideal quench temperature and maximum retained austenite fraction can be
        plotted against the alloy's carbon percentage.
    - label: interface
      text: >
        The GUI and deployment were built with Dash through a web server, so the
        calculator can be used on any device with a browser. Charts are interactive
        and update in real time as weight percentages are adjusted.
    - label: access
      text: Non-public application — contact me for more information.
  image_alt: screenshot · interfaz qpqt
  link: null
  link_label_es: acceso restringido
  link_label_en: restricted access
  link_disabled: true

