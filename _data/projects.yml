- id: bigaku
  title_es: BigakuSan
  title_en: BigakuSan
  type_es: bot · automatización
  type_en: bot · automation
  year: "2020"
  tags_es: [python, twitter api, tumblr]
  tags_en: [python, twitter api, tumblr]
  wide: false
  desc_es: >
    Bot que busca y tuitea imágenes estéticas sobre anime.
    De hecho, él obtuvo su propia foto de perfil.
  desc_en: >
    Bot that searches and tweets aesthetic anime images.
    It even chose its own profile picture.
  images:
    - src: /assets/images/bigaku/bigaku.jpg
      alt: foto de perfil de Bigaku
    - src: /assets/images/bigaku/kagome.gif
      alt: ejemplo — kagome
    - src: /assets/images/bigaku/ejemplo1.gif
      alt: ejemplo — conejito
    - src: /assets/images/bigaku/ejemplo2.gif
      alt: ejemplo — animación
  sections_es:
    - label: origen del nombre
      text: "Japonés: 美学 (Bigaku) — Español: Estética."
    - label: ¿cómo funciona?
      text: >
        Bigaku busca en Tumblr por tags escogidos, recopila todas las imágenes y las
        pondera de acuerdo a qué tan virales han sido. Cada cierto tiempo publica la
        imagen que considera más viral, logrando así una estética con base en los
        criterios de mucha gente en internet.
    - label: estado actual
      text: >
        Activo desde abril 2020 hasta mayo 2023. Con la nueva política de bots
        en Twitter, Bigaku dejó de funcionar.
  sections_en:
    - label: name origin
      text: "Japanese: 美学 (Bigaku) — English: Aesthetics."
    - label: how it works
      text: >
        Bigaku searches Tumblr by selected tags, collects all images and weighs them
        by virality. It periodically publishes the most viral image, achieving an
        aesthetic based on the criteria of many people on the internet.
    - label: current status
      text: >
        Active from April 2020 until May 2023. Twitter's new bot policy shut it down.
  image_alt: foto de perfil · @BigakuSan
  link: https://x.com/BigakuSan
  link_label_es: ver en twitter →
  link_label_en: view on twitter →
  link_disabled: false

